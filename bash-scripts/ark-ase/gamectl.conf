## ---- Paths & identity ---------------------------------------------------
ARK_ROOT="/opt/ark"                 # base of everything
ARK_USER="arkserver"                # unprivileged account that owns/runs the server
STEAMCMD="/usr/games/steamcmd"      # steamcmd binary (apt: 'steamcmd' package)
STEAM_HOME="/home/arkserver"        # home of ARK_USER (where ~/.steam lives)

## ---- Steam app IDs (do not change for ASE) ------------------------------
ARK_APPID="376030"                  # ASE dedicated server
ARK_WORKSHOP_APPID="346110"         # ASE workshop (mods)

## ---- Cluster & admin ----------------------------------------------------
CLUSTER_ID="ozark-cluster"          # shared id enabling cross-ARK transfers
ADMIN_PASSWORD="CHANGE_ME_STRONG"   # RCON/admin password (used locally by scripts)

## ---- Mods ---------------------------------------------------------------
## Comma-separated Steam Workshop IDs, no spaces. Applied to every instance
## via ActiveMods= and downloaded/unpacked server-side by -automanagedmods.
## Load order is left-to-right priority. Leave empty for vanilla.
MODS=""

## ---- Instances ----------------------------------------------------------
## Format:  [key]="MapName GamePort QueryPort RconPort"
## RawPort is derived as GamePort+1 (ARK convention), so don't list it.
## Add a line per map; the key is the instance/systemd name (ark@<key>).
## NOTE: automation consumers (e.g. ark-fleet) GENERATE this file per host —
## edit their inventory, not this. The entries below are reference examples
## using the community-standard per-map port scheme (raw = game+1):
##   TheIsland 7777/27051/27151 . ScorchedEarth 7779/27052/27152
##   Aberration 7781/27053/27153 . Extinction 7783/27054/27154
##   Genesis1 7785/27055/27155  . Genesis2 7787/27056/27156
##   TheCenter 7789/27057/27157 . Ragnarok 7791/27058/27158
##   Valguero 7793/27059/27159  . CrystalIsles 7795/27060/27160
##   LostIsland 7797/27061/27161 . Fjordur 7799/27062/27162
declare -A INSTANCES=(
  [ragnarok]="Ragnarok 7791 27058 27158"
  [fjordur]="Fjordur  7799 27062 27162"
)

## ---- Backups ------------------------------------------------------------
BACKUP_KEEP_DAYS="14"               # purge archived backups older than this

## ---- Steam branch -----------------------------------------------------------
## Pin server files to a Steam beta branch. Empty = live/default branch.
## Clients must run the SAME branch (same major version) or servers are
## silently hidden from their browser. e.g.:
#ARK_BRANCH="preaquatica"

## ---- Downloads ------------------------------------------------------------
## steamcmd retry attempts for install/update (downloads resume between tries).
## Uncomment to override the script default of 4.
#STEAM_RETRIES="4"